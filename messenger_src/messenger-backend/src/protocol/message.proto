syntax = "proto3";
package messenger;

// Обёртка над КАЖДЫМ пакетом, гуляющим по сети — то, что видит relay.
// Relay видит только это, содержимое (текст, тип сообщения) полностью
// скрыто внутри encrypted_payload.
message Packet {
  uint32 protocol_version = 1;
  PacketType type = 2;
  bytes encrypted_payload = 3;   // EncryptedEnvelope, сериализован bincode
  bytes sender_signature = 4;    // подпись пакета отправителем (ed25519)
  uint32 padding_len = 5;        // сколько байт паддинга добавлено до фикс. размера
  // Используется ТОЛЬКО для MAILBOX_FETCH (запрос "отдай мне мои
  // сообщения") и ответа на него (см. network/dispatcher.rs). Раньше
  // Packet вообще не нёс поле получателя, поэтому MAILBOX_FETCH был
  // мёртвой веткой (dispatcher только логировал warning) — relay не мог
  // понять, чей mailbox спрашивают. Для запроса это UserID владельца
  // (подписан sender_signature поверх recipient_user_id, чтобы relay мог
  // проверить, что запрашивающий действительно владеет этим UserID, а не
  // читает чужой mailbox). Для ответа это поле не используется —
  // сообщения приходят в encrypted_payload как bincode Vec<Vec<u8>>.
  string recipient_user_id = 8;
}

enum PacketType {
  UNKNOWN = 0;
  DIRECT_MESSAGE = 1;    // обычное 1-к-1 сообщение
  MAILBOX_STORE = 2;     // "сохрани это для оффлайн-юзера"
  MAILBOX_FETCH = 3;     // "отдай мне мои сообщения"
  DHT_ANNOUNCE = 4;      // "вот моя запись в DHT" (с PoW)
  DHT_LOOKUP = 5;        // поиск UserID
  DUMMY_TRAFFIC = 6;     // мусорный пакет для метаданных-защиты
  RELAY_FORWARD = 7;     // onion-слой: "перешли дальше по цепочке"
}

// Запись, которую пользователь публикует в DHT под ключом Hash(UserID)
message DhtRecord {
  string user_id = 1;
  bytes public_key = 2;
  repeated string mailbox_candidates = 3; // relay ID-шники
  uint64 expires_at_unix = 4;
  bytes signature = 5;                    // подписано приватным ключом юзера
  bytes pow_nonce = 6;                     // anti-spam для самой DHT-записи
}

// Запись, которую пользователь публикует в DHT под ОТДЕЛЬНЫМ ключом
// Hash("prekey:" + UserID) — НЕ тем же ключом, что DhtRecord выше.
// Позволяет двум незнакомцам сделать X3DH: publisher заранее кладёт сюда
// identity-ключ для DH (x3dh_identity_key, X25519 — НЕ тот же ключ, что
// DhtRecord.public_key, тот ed25519 и служит только для подписей),
// signed prekey (подписан ed25519 identity-ключом publisher'а, отдельно
// от подписи самой записи) и пул one-time prekeys для forward secrecy
// первого сообщения.
message PreKeyBundleRecord {
  string user_id = 1;
  bytes x3dh_identity_key = 2;         // X25519 публичный ключ для DH (identity_key в X3dhSession)
  bytes signed_prekey = 3;             // X25519 публичный ключ, меняется реже one-time prekeys
  bytes signed_prekey_signature = 4;   // подпись ed25519 identity-ключом (см. identity/mod.rs) поверх signable-полей
  repeated bytes one_time_prekeys = 5; // пул одноразовых X25519 ключей — израсходовав, нужно republish
  uint64 expires_at_unix = 6;
  bytes pow_nonce = 7;                 // anti-spam для самой записи, тот же паттерн что и DhtRecord.pow_nonce
}

// Onion-слой — каждый relay снимает один слой и видит только это
message OnionLayer {
  string next_hop_relay_id = 1;  // куда переслать дальше ("" = я последний, доставь в mailbox)
  bytes inner_payload = 2;       // следующий OnionLayer (зашифрован) либо финальный Packet
}

// DHT-запись, которую relay-узел публикует под ключом Hash("relay:" + relay_id),
// чтобы другие узлы могли построить через него onion-маршрут.
// Ключ onion_public_key (X25519) отдельный от libp2p transport key —
// transport key шифрует сам канал, этот ключ шифрует конкретный onion-слой.
message RelayDescriptorRecord {
  string relay_id = 1;          // libp2p PeerId string — совпадает с ключом поиска
  bytes onion_public_key = 2;   // X25519 публичный ключ (32 байта) для onion-шифрования
  uint64 expires_at_unix = 3;
  bytes signature = 4;          // ed25519-подпись relay'я поверх onion_public_key
  bytes pow_nonce = 5;          // anti-spam, тот же паттерн что DhtRecord.pow_nonce
}
